name: projeto-jornal

services:
  app:
   build: .
   ports:
     - 9000:8000
   env_file: .env
   develop:
      watch:
        - action: sync
          path: .
          target: /usr/src/app
          initial_sync: true
          ignore:
            - virtualenv

        - action: rebuild
          path: requirements.txt
   